server {
    listen 80;
    listen [::]:80;
    server_name sql.pazhaug.info;
    return 308 https://sql.pazhaug.info$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sql.pazhaug.info;

    ssl_certificate /etc/letsencrypt/live/sql.pazhaug.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sql.pazhaug.info/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 12m;

    location ~ ^/api/tuning/tasks/[0-9]+/events$ {
        proxy_pass http://127.0.0.1:18084;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        add_header X-Accel-Buffering no always;
    }

    location / {
        proxy_pass http://127.0.0.1:18084;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }
}
