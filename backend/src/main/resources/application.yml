server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:64}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:8}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:512}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:256}
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax

spring:
  datasource:
    url: ${SQL_TUNER_DB_URL:jdbc:mysql://mysql:3306/sql_tuner?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SQL_TUNER_DB_USERNAME:sql_tuner}
    password: ${SQL_TUNER_DB_PASSWORD:}
    driver-class-name: ${SQL_TUNER_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: ${SQL_TUNER_DB_POOL_SIZE:12}
      minimum-idle: ${SQL_TUNER_DB_MIN_IDLE:2}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

llm:
  provider: ${LLM_PROVIDER:mock}
  base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  model: ${LLM_MODEL:qwen-plus}
  vision-model: ${LLM_VISION_MODEL:qwen3-vl-plus}
  api-key: ${DASHSCOPE_API_KEY:}
  reasoning-effort: ${LLM_REASONING_EFFORT:}
  timeout-ms: ${LLM_TIMEOUT_MS:30000}
  mock-delay-ms: ${LLM_MOCK_DELAY_MS:0}

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:https://sql.pazhaug.info}
  queue:
    worker-count: ${SQL_TUNER_WORKERS:10}
    max-running: ${SQL_TUNER_LLM_MAX_PARALLEL:10}
    max-queued-global: ${SQL_TUNER_QUEUE_MAX_GLOBAL:100}
    max-queued-per-user: ${SQL_TUNER_QUEUE_MAX_PER_USER:10}
    lease-seconds: ${SQL_TUNER_QUEUE_LEASE_SECONDS:90}
    heartbeat-seconds: ${SQL_TUNER_QUEUE_HEARTBEAT_SECONDS:15}
  retention:
    enabled: ${SQL_TUNER_RETENTION_ENABLED:false}
    conversation-days: ${SQL_TUNER_RETENTION_DAYS:7}
    batch-size: ${SQL_TUNER_RETENTION_BATCH_SIZE:100}
    max-batches: ${SQL_TUNER_RETENTION_MAX_BATCHES:10}
    initial-delay-ms: ${SQL_TUNER_RETENTION_INITIAL_DELAY_MS:60000}
    interval-ms: ${SQL_TUNER_RETENTION_INTERVAL_MS:86400000}
  legacy-import:
    enabled: ${SQL_TUNER_LEGACY_IMPORT_ENABLED:false}
    dry-run: ${SQL_TUNER_LEGACY_IMPORT_DRY_RUN:true}
    path: ${SQL_TUNER_LEGACY_IMPORT_PATH:}
    admin-password: ${SQL_TUNER_ADMIN_PASSWORD:}
    user-password: ${SQL_TUNER_USER_PASSWORD:}
