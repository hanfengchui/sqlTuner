server:
  port: ${SERVER_PORT:8080}

spring:
  jackson:
    default-property-inclusion: non_null
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

llm:
  provider: ${LLM_PROVIDER:mock}
  base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  model: ${LLM_MODEL:qwen-plus}
  api-key: ${DASHSCOPE_API_KEY:}
  timeout-ms: ${LLM_TIMEOUT_MS:30000}

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
  storage:
    data-dir: ${SQL_TUNER_DATA_DIR:./data}
