name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - "hardening/**"

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "8"
          cache: maven
      - name: Run backend unit tests
        working-directory: backend
        run: mvn test

  backend-mysql:
    name: Backend MySQL 8 Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "8"
          cache: maven
      - name: Run MySQL integration tests
        working-directory: backend
        env:
          SQLTUNER_REQUIRE_DOCKER: "true"
        run: mvn -Pmysql-integration -Dtest=NoUnitTests -DfailIfNoTests=false verify

  frontend:
    name: Frontend Test And Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  desktop-playwright:
    name: Desktop Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run desktop e2e
        working-directory: frontend
        run: npm run e2e
